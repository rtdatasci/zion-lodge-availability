name: Zion Lodge Availability Checker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check availability for Apr 5-6 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=04-05-2026&checkout=04-06-2026&adults=2', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            try {
              await page.waitForSelector('.room-card, .room-type, .available-room, [class*=\"room\"]', { timeout: 15000 });
            } catch(e) {}
            await new Promise(r => setTimeout(r, 8000));

            const bodyText = await page.evaluate(() => document.body.innerText);
            await browser.close();

            if (bodyText.includes('currently sold out') || bodyText.includes('Soldout')) {
              console.log('NO - Sold out');
              process.exit(0);
            }

            const resultsMatch = bodyText.match(/(\d+)\s+results?\s+found/i);
            const resultCount = resultsMatch ? parseInt(resultsMatch[1]) : 0;

            if (resultCount > 0) {
              console.log('YES');
              console.log(\`  \${resultCount} room type(s) available:\`);
              const roomNames = ['Lodge Room 2 Queen Beds ADA', 'Lodge Room 2 Queen Beds', 'Western Cabin 2 Double Beds', 'Western Cabin 1 Queen Bed', 'Western Cabin One Queen ADA', 'Lodge Suite', 'King'];
              roomNames.forEach(name => {
                if (bodyText.includes(name)) console.log(\`  - \${name}\`);
              });
            } else {
              console.log('NO');
            }
          })();
          " > /tmp/result_apr56.txt 2>&1

          cat /tmp/result_apr56.txt
          AVAILABLE=$(cat /tmp/result_apr56.txt)
          echo "Availability result (Apr 5-6): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Apr 5-6: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Check availability for Apr 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=04-06-2026&checkout=04-07-2026&adults=2', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            try {
              await page.waitForSelector('.room-card, .room-type, .available-room, [class*=\"room\"]', { timeout: 15000 });
            } catch(e) {}
            await new Promise(r => setTimeout(r, 8000));

            const bodyText = await page.evaluate(() => document.body.innerText);
            await browser.close();

            if (bodyText.includes('currently sold out') || bodyText.includes('Soldout')) {
              console.log('NO - Sold out');
              process.exit(0);
            }

            const resultsMatch = bodyText.match(/(\d+)\s+results?\s+found/i);
            const resultCount = resultsMatch ? parseInt(resultsMatch[1]) : 0;

            if (resultCount > 0) {
              console.log('YES');
              console.log(\`  \${resultCount} room type(s) available:\`);
              const roomNames = ['Lodge Room 2 Queen Beds ADA', 'Lodge Room 2 Queen Beds', 'Western Cabin 2 Double Beds', 'Western Cabin 1 Queen Bed', 'Western Cabin One Queen ADA', 'Lodge Suite', 'King'];
              roomNames.forEach(name => {
                if (bodyText.includes(name)) console.log(\`  - \${name}\`);
              });
            } else {
              console.log('NO');
            }
          })();
          " > /tmp/result_apr67.txt 2>&1

          cat /tmp/result_apr67.txt
          AVAILABLE=$(cat /tmp/result_apr67.txt)
          echo "Availability result (Apr 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "APR67_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Apr 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          ALL_DETAILS="${AVAILABILITY_DETAILS}${APR67_DETAILS}"
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$ALL_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Apr 5-6 or Apr 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "${AVAILABILITY_DETAILS}${APR67_DETAILS}"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
