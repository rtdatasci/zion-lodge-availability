name: Sequoia Lodges Availability Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check John Muir Lodge - May 22-23 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox','--disable-setuid-sandbox','--disable-blink-features=AutomationControlled','--window-size=1920,1080']
            });
            const page = await browser.newPage();
            await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
            await page.setViewport({ width: 1920, height: 1080 });
            await page.setExtraHTTPHeaders({ 'Accept-Language': 'en-US,en;q=0.9' });
            await page.evaluateOnNewDocument(() => {
              Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
              window.chrome = { runtime: {} };
              Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3] });
              Object.defineProperty(navigator, 'languages', { get: () => ['en-US', 'en'] });
            });
            await page.goto('https://be.synxis.com/?adult=1&arrive=2026-05-22&chain=398&child=0&currency=USD&depart=2026-05-23&dest=SEKI&hotel=59989&level=hotel&locale=en-US&rooms=1&start=availresults&theme=sequoia2', {
              waitUntil: 'networkidle0', timeout: 60000
            });
            await new Promise(r => setTimeout(r, 12000));
            const bodyText = await page.evaluate(() => document.body.innerText);
            await browser.close();
            if (/no rooms available|sold out|no availability|no results/i.test(bodyText)) {
              console.log('NO');
            } else if (/book now|\$\d+/i.test(bodyText)) {
              console.log('YES');
              const lines = bodyText.split('\n').map(l => l.trim()).filter(l => l.length > 5 && l.length < 80);
              const roomLines = lines.filter(l => /queen|king|double|standard|deluxe|suite|cabin/i.test(l) && !/nav|menu|cart|sign/i.test(l));
              roomLines.slice(0, 5).forEach(l => console.log('  - ' + l));
            } else { console.log('NO'); }
          })();
          " > /tmp/jml_2223.txt 2>&1
          cat /tmp/jml_2223.txt
          RESULT=$(grep -m1 "^YES\|^NO" /tmp/jml_2223.txt)
          echo "John Muir May 22-23: $RESULT"
          if [ "$RESULT" = "YES" ]; then
            echo "JML_2223=true" >> $GITHUB_ENV
            echo "DETAILS_JML_2223<<EOF" >> $GITHUB_ENV
            echo "John Muir Lodge May 22-23:" >> $GITHUB_ENV
            cat /tmp/jml_2223.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "JML_2223=false" >> $GITHUB_ENV
          fi

