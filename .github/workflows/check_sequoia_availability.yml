            echo "EOF" >> $GITHUB_ENV
          else
            echo "CGL_2324=false" >> $GITHUB_ENV
          fi

      - name: Log results
        run: |
          ANY_AVAILABLE=false
          if [ "$JML_2223" = "true" ] || [ "$JML_2324" = "true" ] || [ "$CGL_2223" = "true" ] || [ "$CGL_2324" = "true" ]; then
            ANY_AVAILABLE=true
          fi
          if [ "$ANY_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "${DETAILS_JML_2223}${DETAILS_JML_2324}${DETAILS_CGL_2223}${DETAILS_CGL_2324}"
            echo "John Muir Book: https://be.synxis.com/?adult=1&chain=398&child=0&currency=USD&dest=SEKI&hotel=59989&level=hotel&locale=en-US&rooms=1&theme=sequoia2"
            echo "Cedar Grove Book: https://be.synxis.com/?adult=1&chain=398&child=0&currency=USD&dest=SEKI&hotel=59988&level=hotel&locale=en-US&rooms=1&theme=sequoia2"
          else
            echo "No availability found for John Muir or Cedar Grove on May 22-23 or May 23-24. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.JML_2223 == 'true' || env.JML_2324 == 'true' || env.CGL_2223 == 'true' || env.CGL_2324 == 'true'
        run: |
          echo "Rooms available at Sequoia lodges! Failing to trigger email."
          echo "${DETAILS_JML_2223}${DETAILS_JML_2324}${DETAILS_CGL_2223}${DETAILS_CGL_2324}"
          echo "John Muir Book: https://be.synxis.com/?adult=1&chain=398&child=0&currency=USD&dest=SEKI&hotel=59989&level=hotel&locale=en-US&rooms=1&theme=sequoia2"
