name: Sequoia Lodges Availability Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check John Muir Lodge - May 22-23 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox', '--disable-setuid-sandbox'] });
            const page = await browser.newPage();
            await page.goto('https://be.synxis.com/?adult=1&arrive=2026-05-22&chain=398&child=0&currency=USD&depart=2026-05-23&dest=SEKI&hotel=59989&level=hotel&locale=en-US&rooms=1&start=availresults&theme=sequoia2', {
              waitUntil: 'networkidle0', timeout: 60000
            });
            try { await page.waitForSelector('[class*=\"room\"], [class*=\"rate\"], [class*=\"avail\"]', { timeout: 15000 }); } catch(e) {}
            await new Promise(r => setTimeout(r, 8000));
            const bodyText = await page.evaluate(() => document.body.innerText);
            await browser.close();
            console.error('BODY:' + bodyText.substring(0, 3000));
            if (/no rooms available|sold out|no availability|no results/i.test(bodyText)) {
              console.log('NO');
            } else if (/book now|select|per night|avg\/night|\$\d+/i.test(bodyText)) {
              console.log('YES');
              const lines = bodyText.split('\n').map(l => l.trim()).filter(l => l.length > 3 && l.length < 100);
              const roomLines = lines.filter(l => /room|suite|cabin|king|queen|double|standard|deluxe/i.test(l));
              roomLines.slice(0, 10).forEach(l => console.log('  - ' + l));
            } else {
              console.log('UNKNOWN');
            }
          })();
          " > /tmp/jml_may2223.txt 2>/tmp/jml_may2223_debug.txt
          echo "=== DEBUG ===" && cat /tmp/jml_may2223_debug.txt
          echo "=== RESULT ===" && cat /tmp/jml_may2223.txt
          RESULT=$(cat /tmp/jml_may2223.txt)
          echo "John Muir May 22-23: $RESULT"
          if echo "$RESULT" | grep -q "^YES"; then
            echo "JML_2223=true" >> $GITHUB_ENV
            echo "DETAILS_JML_2223<<EOF" >> $GITHUB_ENV
            echo "John Muir Lodge May 22-23: $RESULT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "JML_2223=false" >> $GITHUB_ENV
          fi

