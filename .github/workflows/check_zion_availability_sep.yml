name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check availability for Sep 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            let availableRooms = null;

            // Intercept ALL responses from api.ibe.stayntouch.com
            page.on('response', async response => {
              const url = response.url();
              if (url.includes('api.ibe.stayntouch.com') && !url.match(/\.(jpg|png|css|js|ico|woff)/)) {
                try {
                  const text = await response.text();
                  console.error('API_URL: ' + url);
                  console.error('API_RESPONSE: ' + text.substring(0, 500));
                  if (text.includes('availableRooms')) {
                    availableRooms = JSON.parse(text);
                  }
                } catch(e) {
                  console.error('API_PARSE_ERR: ' + e.message);
                }
              }
            });

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            // Wait extra time for lazy API calls
            await new Promise(r => setTimeout(r, 10000));
            await browser.close();

            if (!availableRooms) {
              console.log('PARSE_ERROR: No availableRooms data found in any API response');
              process.exit(0);
            }

            try {
              const rooms = availableRooms.availableRooms || availableRooms;
              const available = (Array.isArray(rooms) ? rooms : []).filter(r => (r.availability || 0) > 0);
              if (available.length > 0) {
                console.log('YES');
                available.forEach(r => {
                  const name = Buffer.from(r.name || '', 'base64').toString('utf-8');
                  const avail = r.availability || '?';
                  const rate = (r.plans && r.plans[0]) ? r.plans[0].adr : 0;
                  console.log(\`  - \${name}: \${avail} available @ \$\${rate}/night\`);
                });
              } else {
                console.log('NO');
              }
            } catch(e) {
              console.log('PARSE_ERROR: ' + e.message);
            }
          })();
          " > /tmp/result.txt 2>/tmp/debug.txt

          echo "=== DEBUG OUTPUT ==="
          cat /tmp/debug.txt
          echo "=== RESULT ==="
          cat /tmp/result.txt

          AVAILABLE=$(cat /tmp/result.txt)
          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
