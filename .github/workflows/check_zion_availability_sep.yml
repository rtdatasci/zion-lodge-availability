name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check availability for Sep 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            try {
              await page.waitForSelector('.room-card, .room-type, .available-room, [class*=\"room\"]', { timeout: 15000 });
            } catch(e) {}
            await new Promise(r => setTimeout(r, 8000));

            const bodyText = await page.evaluate(() => document.body.innerText);
            await browser.close();

            // Check if sold out
            if (bodyText.includes('currently sold out') || bodyText.includes('Soldout')) {
              console.log('NO - Sold out message detected');
              process.exit(0);
            }

            // Extract room names and prices from body text using Book Now as anchor
            const lines = bodyText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const rooms = [];
            for (let i = 0; i < lines.length; i++) {
              // Room names appear just before price lines
              if (lines[i].match(/^\\\$[\d,]+\\.?\d*$/) && lines[i+1] === 'Avg/Night') {
                // Walk back to find room name
                for (let j = i - 1; j >= Math.max(0, i - 6); j--) {
                  if (lines[j].match(/^(Lodge|Western|Cabin|Suite|King|Queen|Room)/i)) {
                    rooms.push({ name: lines[j], price: lines[i] });
                    break;
                  }
                }
              }
            }

            // Also check for 'results found' line to confirm availability
            const resultsMatch = bodyText.match(/(\d+)\s+results?\s+found/i);
            const resultCount = resultsMatch ? parseInt(resultsMatch[1]) : 0;

            if (resultCount > 0 || rooms.length > 0) {
              console.log('YES');
              if (resultCount > 0) console.log(\`  \${resultCount} room type(s) available:\`);
              if (rooms.length > 0) {
                rooms.forEach(r => console.log(\`  - \${r.name}: \${r.price}/night\`));
              } else {
                // Fallback: just list unique room names from body
                const roomNames = ['Lodge Room 2 Queen Beds', 'Lodge Room 2 Queen Beds ADA', 'Western Cabin 2 Double Beds', 'Western Cabin 1 Queen Bed', 'Western Cabin One Queen ADA'];
                roomNames.forEach(name => {
                  if (bodyText.includes(name)) console.log(\`  - \${name}: available\`);
                });
              }
            } else {
              console.log('NO');
            }
          })();
          " > /tmp/result.txt 2>/tmp/debug.txt

          echo "=== DEBUG ==="
          cat /tmp/debug.txt
          echo "=== RESULT ==="
          cat /tmp/result.txt

          AVAILABLE=$(cat /tmp/result.txt)
          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2"
          exit 1
