name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check availability for Sep 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            // Capture any availability data from XHR/fetch responses
            let foundData = null;
            page.on('response', async response => {
              const url = response.url();
              if (url.includes('stayntouch') && !url.includes('.jpg') && !url.includes('.png') && !url.includes('.css') && !url.includes('.js')) {
                try {
                  const text = await response.text();
                  if (text.includes('availableRooms') || text.includes('availability')) {
                    console.error('FOUND_API_URL: ' + url);
                    console.error('FOUND_API_RESPONSE: ' + text.substring(0, 2000));
                    foundData = text;
                  }
                } catch(e) {}
              }
            });

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2', {
              waitUntil: 'networkidle2',
              timeout: 60000
            });
            await new Promise(r => setTimeout(r, 8000));

            const content = await page.content();
            await browser.close();

            // Debug: print first 3000 chars of rendered HTML
            console.error('--- PAGE HTML SAMPLE ---');
            console.error(content.substring(0, 3000));
            console.error('--- END SAMPLE ---');

            // Try to find srpData with a looser pattern
            const match = content.match(/srpData[\"']?\s*:\s*(\{[\s\S]{100,})/);
            if (!match) {
              console.log('PARSE_ERROR: srpData not found - see debug output above');
              process.exit(0);
            }

            // Try to extract just the availableRooms array
            try {
              const chunk = match[1];
              const roomsMatch = chunk.match(/\"availableRooms\"\s*:\s*(\[[\s\S]*?\])\s*,\s*\"minimumPrice\"/);
              if (!roomsMatch) {
                console.log('PARSE_ERROR: availableRooms array not found');
                process.exit(0);
              }
              const rooms = JSON.parse(roomsMatch[1]);
              const available = rooms.filter(r => (r.availability || 0) > 0);
              if (available.length > 0) {
                console.log('YES');
                available.forEach(r => {
                  const name = Buffer.from(r.name || '', 'base64').toString('utf-8');
                  const avail = r.availability || '?';
                  const rate = (r.plans && r.plans[0]) ? r.plans[0].adr : 0;
                  console.log(\`  - \${name}: \${avail} available @ \$\${rate}/night\`);
                });
              } else {
                console.log('NO');
              }
            } catch(e) {
              console.log('PARSE_ERROR: ' + e.message);
            }
          })();
          " > /tmp/result.txt 2>/tmp/debug.txt

          echo "=== DEBUG OUTPUT ==="
          cat /tmp/debug.txt
          echo "=== RESULT ==="
          cat /tmp/result.txt

          AVAILABLE=$(cat /tmp/result.txt)
          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
