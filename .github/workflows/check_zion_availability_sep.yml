name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Check availability for Sep 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2', {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            // Wait for Angular to finish rendering room cards
            try {
              await page.waitForSelector('.room-card, .room-type, .available-room, [class*=\"room\"]', { timeout: 15000 });
            } catch(e) {
              console.error('Selector wait timed out, proceeding anyway');
            }
            await new Promise(r => setTimeout(r, 8000));

            // Try to pull srpData out of the Angular scope / window
            const result = await page.evaluate(() => {
              // Try window variables first
              if (window.__INITIAL_STATE__) return JSON.stringify(window.__INITIAL_STATE__);
              if (window.srpData) return JSON.stringify(window.srpData);

              // Walk Angular's internal scope to find srpData
              try {
                const allElements = document.querySelectorAll('*');
                for (const el of allElements) {
                  const scope = window.angular && window.angular.element(el).scope && window.angular.element(el).scope();
                  if (scope && scope.srpData && scope.srpData.availableRooms) {
                    return JSON.stringify(scope.srpData);
                  }
                }
              } catch(e) {}

              // Try Vue devtools
              try {
                const vueEl = document.querySelector('#app').__vue__;
                if (vueEl && vueEl.\$data) return JSON.stringify(vueEl.\$data);
              } catch(e) {}

              // Last resort: scrape room cards from the DOM
              const rooms = [];
              document.querySelectorAll('[class*=\"room\"], [class*=\"suite\"], [class*=\"cabin\"]').forEach(el => {
                const text = el.innerText;
                if (text && text.length > 10) rooms.push(text.substring(0, 200));
              });
              if (rooms.length > 0) return JSON.stringify({ domRooms: rooms });

              return null;
            });

            console.error('PAGE EVAL RESULT: ' + result);

            // Also dump visible text from the page
            const bodyText = await page.evaluate(() => document.body.innerText.substring(0, 3000));
            console.error('BODY TEXT: ' + bodyText);

            await browser.close();

            if (!result) {
              console.log('PARSE_ERROR: Could not extract data from page');
              process.exit(0);
            }

            try {
              const data = JSON.parse(result);

              // Handle srpData format
              if (data.availableRooms) {
                const available = data.availableRooms.filter(r => (r.availability || 0) > 0);
                if (available.length > 0) {
                  console.log('YES');
                  available.forEach(r => {
                    const name = Buffer.from(r.name || '', 'base64').toString('utf-8');
                    const avail = r.availability || '?';
                    const rate = (r.plans && r.plans[0]) ? r.plans[0].adr : 0;
                    console.log(\`  - \${name}: \${avail} available @ \$\${rate}/night\`);
                  });
                } else {
                  console.log('NO');
                }
              } else if (data.domRooms) {
                console.error('DOM rooms found: ' + JSON.stringify(data.domRooms));
                console.log('MANUAL_CHECK_NEEDED');
              } else {
                console.log('PARSE_ERROR: Unexpected data format');
              }
            } catch(e) {
              console.log('PARSE_ERROR: ' + e.message);
            }
          })();
          " > /tmp/result.txt 2>/tmp/debug.txt

          echo "=== DEBUG OUTPUT ==="
          cat /tmp/debug.txt
          echo "=== RESULT ==="
          cat /tmp/result.txt

          AVAILABLE=$(cat /tmp/result.txt)
          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
