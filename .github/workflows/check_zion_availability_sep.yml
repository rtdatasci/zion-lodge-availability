name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Install Puppeteer
        run: |
          npm install puppeteer

      - name: Check availability for Sep 6-7 2026
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            let srpData = null;

            // Intercept console.error which is where srpData gets logged
            page.on('console', msg => {
              const text = msg.text();
              if (text.includes('srpData')) {
                try {
                  const match = text.match(/srpData[\"']?\s*:\s*(\{.*)/s);
                  if (match) srpData = JSON.parse(match[1]);
                } catch(e) {}
              }
            });

            // Intercept the page's window object after load to grab srpData
            await page.goto('https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2', {
              waitUntil: 'networkidle2',
              timeout: 60000
            });

            // Wait a bit for Angular to render
            await new Promise(r => setTimeout(r, 5000));

            // Extract srpData from the page's rendered HTML
            const content = await page.content();
            await browser.close();

            // Parse srpData from rendered HTML
            const match = content.match(/\"srpData\"\s*:\s*(\{[\s\S]*?\"minimumPrice\":\d+[\s\S]*?\"error\":\{\"errors\":\[\]\}\})/);
            if (!match) {
              console.log('PARSE_ERROR: srpData not found in rendered page');
              process.exit(0);
            }

            try {
              const data = JSON.parse(match[1]);
              const rooms = data.availableRooms || [];
              const available = rooms.filter(r => (r.availability || 0) > 0);
              if (available.length > 0) {
                console.log('YES');
                available.forEach(r => {
                  const name = Buffer.from(r.name || '', 'base64').toString('utf-8');
                  const avail = r.availability || '?';
                  const rate = (r.plans && r.plans[0]) ? r.plans[0].adr : 0;
                  console.log(\`  - \${name}: \${avail} available @ \$\${rate}/night\`);
                });
              } else {
                console.log('NO');
              }
            } catch(e) {
              console.log('PARSE_ERROR: ' + e.message);
            }
          })();
          " > /tmp/result.txt 2>&1

          cat /tmp/result.txt
          AVAILABLE=$(cat /tmp/result.txt)

          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
