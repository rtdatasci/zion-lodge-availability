name: Zion Lodge Availability Checker - Sep 6-7

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # lets you also trigger it manually from GitHub UI

jobs:
  check-availability:
    runs-on: ubuntu-latest

    steps:
      - name: Check availability for Sep 6-7 2026
        run: |
          # Fetch the search results page HTML
          RESPONSE=$(curl -s \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            "https://zionlodge.ibe.stayntouch.com/search-results?checkin=09-06-2026&checkout=09-07-2026&adults=2")

          # Extract the JSON blob embedded in the page (srpData contains availableRooms)
          AVAILABLE=$(echo "$RESPONSE" | python3 -c "
          import sys, json, re, base64

          html = sys.stdin.read()

          # The page embeds availability JSON in a script tag as srpData
          match = re.search(r'\"srpData\"\s*:\s*(\{.*?\"minimumPrice\":\d+.*?\"error\":\{\"errors\":\[\]\}\})', html, re.DOTALL)
          if not match:
              print('PARSE_ERROR: Could not find srpData in page')
              sys.exit(0)

          try:
              data = json.loads(match.group(1))
              rooms = data.get('availableRooms', [])
              available = [r for r in rooms if r.get('availability', 0) > 0]
              if available:
                  print('YES')
                  for r in available:
                      # Room names are base64 encoded
                      try:
                          name = base64.b64decode(r.get('name', '')).decode('utf-8')
                      except:
                          name = r.get('name', 'Unknown')
                      avail = r.get('availability', '?')
                      rate = r.get('plans', [{}])[0].get('adr', 0)
                      print(f'  - {name}: {avail} available @ \${rate}/night')
              else:
                  print('NO')
          except Exception as e:
              print(f'PARSE_ERROR: {e}')
          " 2>&1)

          echo "Availability result (Sep 6-7): $AVAILABLE"

          if echo "$AVAILABLE" | grep -q "^YES"; then
            echo "ROOMS_AVAILABLE=true" >> $GITHUB_ENV
            echo "AVAILABILITY_DETAILS<<EOF" >> $GITHUB_ENV
            echo "Sep 6-7: $AVAILABLE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "ROOMS_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Log result
        run: |
          if [ "$ROOMS_AVAILABLE" = "true" ]; then
            echo "ROOMS AVAILABLE!"
            echo "$AVAILABILITY_DETAILS"
            echo "Book here: https://zionlodge.ibe.stayntouch.com/"
          else
            echo "No rooms available for Sep 6-7. Will check again soon."
          fi

      # ---------------------------------------------------------------
      # Fail intentionally to trigger GitHub email notification.
      # ---------------------------------------------------------------
      - name: Fail intentionally to trigger GitHub email notification
        if: env.ROOMS_AVAILABLE == 'true'
        run: |
          echo "Rooms available! Failing this step so GitHub emails you."
          echo "$AVAILABILITY_DETAILS"
          echo "Book NOW: https://zionlodge.ibe.stayntouch.com/"
          exit 1
